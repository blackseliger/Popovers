<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form class="form-popovers" novalidate>
        <div class="buttonBlock">
            <button type="submit" class="btn" id="btnID" data-toggle="popover" title="Popover title" data-content="And here's some amazing content. It's very engaging. Right?">Click to toggle popever</button>
        </div>
        <div class="popover-message popover-hidden"> 
            <div class="header"> 
                Popover title
            </div>
            <div class="contentPopover">
                And here's some amazing content. It's very engaging. Right?
            </div>
        </div>
    </form>
</body>
</html>
